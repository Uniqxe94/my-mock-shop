<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIQXE SHOP - v1.0.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
        .bg-custom { background-color: #E8F5E9; }
    </style>
</head>
<body class="bg-custom min-h-screen font-sans">

    <nav id="nav-bar" class="bg-[#A5D6A7] p-4 shadow-sm hidden">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="font-black text-xl tracking-tighter">UNIQXE SHOP</h1>
            <div class="flex gap-4 items-center">
                <span id="user-display" class="font-bold text-sm"></span>
                <button onclick="logout()" class="bg-black text-white px-3 py-1 rounded-md text-xs font-bold hover:opacity-80">ออกจากระบบ</button>
            </div>
        </div>
    </nav>

    <div id="view-login" class="max-w-sm mx-auto mt-20 p-8 bg-white rounded-3xl shadow-xl border border-gray-100 relative">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black mb-2">UNIQXE</h2>
            <p class="text-gray-400 text-sm">เข้าสู่ระบบเพื่อเริ่มช้อป</p>
        </div>
        
        <div id="error-msg" class="text-red-500 text-xs mb-4 text-center font-bold h-4"></div>
        
        <input id="in-user" type="text" placeholder="Username (ลอง: Saranyoo)" class="w-full border-2 border-gray-100 p-3 rounded-xl mb-3 outline-none focus:border-green-400">
        <input id="in-pass" type="password" placeholder="Password (1234)" class="w-full border-2 border-gray-100 p-3 rounded-xl mb-6 outline-none focus:border-green-400">
        
        <button onclick="performLogin()" class="w-full bg-black text-white py-3 rounded-xl font-bold hover:bg-gray-800 transition">เข้าสู่ระบบ</button>
        
        <div class="absolute bottom-4 right-6 text-[10px] text-gray-300 font-mono font-bold">v1.0.0</div>
    </div>

    <div id="view-shop" class="max-w-6xl mx-auto p-6 hidden">
        <h2 class="text-2xl font-black mb-8">คลังสินค้าแนะนำ</h2>
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            </div>
    </div>

    <script>
        // Data
        const PRODUCTS = [
            { id: 1, name: "New Vespa Sprint", price: "125,000", img: "https://picsum.photos/seed/vespa/400/400" },
            { id: 2, name: "Fix Gear Frame", price: "15,900", img: "https://picsum.photos/seed/fixgear/400/400" },
            { id: 3, name: "Art Creator Kit", price: "2,500", img: "https://picsum.photos/seed/art/400/400" },
            { id: 4, name: "YoungTrips Cap", price: "590", img: "https://picsum.photos/seed/cap/400/400" }
        ];

        // Init User
        if(!localStorage.getItem('user_Saranyoo')) {
            localStorage.setItem('user_Saranyoo', JSON.stringify({username: 'Saranyoo', pass: '1234'}));
        }

        // Logic
        function performLogin() {
            const u = document.getElementById('in-user').value;
            const p = document.getElementById('in-pass').value;
            const data = localStorage.getItem('user_' + u);
            
            if(data && JSON.parse(data).pass === p) {
                localStorage.setItem('session', u);
                window.location.reload();
            } else {
                document.getElementById('error-msg').innerText = "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง";
            }
        }

        function renderApp() {
            const session = localStorage.getItem('session');
            if(session) {
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('nav-bar').classList.remove('hidden');
                document.getElementById('view-shop').classList.remove('hidden');
                document.getElementById('user-display').innerText = "สวัสดี, " + session;
                
                const grid = document.getElementById('product-grid');
                grid.innerHTML = PRODUCTS.map(p => `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border hover:shadow-md transition">
                        <img src="${p.img}" class="rounded-xl mb-4 w-full aspect-square object-cover">
                        <p class="font-bold text-sm">${p.name}</p>
                        <p class="text-xs text-gray-400 mt-1">฿${p.price}</p>
                    </div>
                `).join('');
            }
        }

        function logout() {
            localStorage.removeItem('session');
            window.location.reload();
        }

        window.onload = renderApp;
    </script>
</body>
</html>
