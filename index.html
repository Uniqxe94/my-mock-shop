<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Shopee - Automation Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .shopee-orange { background-color: #ee4d2d; }
        .shopee-text { color: #ee4d2d; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav id="user-navbar" class="shopee-orange text-white p-4 shadow-md hidden sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="font-bold text-xl">Shopee Mockup</div>
            <div class="flex items-center gap-4">
                <span id="nav-user-info" class="text-sm">Username: <b id="current-user-display"></b></span>
                <button id="btn-logout" onclick="logout()" class="bg-white text-orange-600 px-3 py-1 rounded-md text-sm font-bold hover:bg-gray-100 transition">ออกจากระบบ</button>
            </div>
        </div>
    </nav>

    <div class="max-w-lg mx-auto mt-10 p-4">
        
        <div id="view-login" class="bg-white p-8 rounded-lg shadow-lg">
            <h2 class="text-2xl font-bold mb-6 text-center shopee-text">เข้าสู่ระบบ</h2>
            <div id="login-error" class="text-red-500 text-sm mb-4 text-center"></div>
            
            <div class="space-y-4">
                <input id="login-username" type="text" placeholder="ชื่อผู้ใช้" class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-orange-500">
                <input id="login-password" type="password" placeholder="รหัสผ่าน" class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-orange-500">
                <button id="btn-login" onclick="login()" class="w-full shopee-orange text-white font-bold py-2 rounded hover:opacity-90 transition">ล็อกอิน</button>
            </div>
            
            <div class="mt-6 text-center text-sm text-gray-500">
                ยังไม่มีบัญชี? <button id="btn-go-register" onclick="showView('register')" class="text-blue-500 hover:underline">สมัครสมาชิกที่นี่</button>
            </div>
        </div>

        <div id="view-register" class="bg-white p-8 rounded-lg shadow-lg hidden">
            <h2 class="text-2xl font-bold mb-6 text-center shopee-text">สมัครสมาชิก</h2>
            <div id="reg-error" class="text-red-500 text-sm mb-4 text-center"></div>
            
            <div class="space-y-3">
                <input id="reg-username" type="text" placeholder="Username" class="w-full border p-2 rounded">
                <input id="reg-password" type="password" placeholder="Password" class="w-full border p-2 rounded">
                <input id="reg-confirm-password" type="password" placeholder="Confirm Password" class="w-full border p-2 rounded">
                <input id="reg-phone" type="text" placeholder="Phone Number" class="w-full border p-2 rounded">
                <input id="reg-email" type="email" placeholder="Email" class="w-full border p-2 rounded">
                
                <button id="btn-register" onclick="register()" class="w-full shopee-orange text-white font-bold py-2 rounded hover:opacity-90">ยืนยันการสมัคร</button>
                <button id="btn-back-login" onclick="showView('login')" class="w-full text-gray-500 text-sm mt-2">ย้อนกลับ</button>
            </div>
        </div>

        <div id="view-user-shop" class="bg-white p-8 rounded-lg shadow-lg hidden">
            <h2 class="text-2xl font-bold mb-4 shopee-text">ยินดีต้อนรับสู่ร้านค้า</h2>
            <div class="border-2 border-dashed border-gray-200 p-10 text-center text-gray-400">
                รายการสินค้าจะแสดงที่นี่ (สำหรับการทำเทสพื้นฐาน)
            </div>
        </div>

    </div>

    <div id="view-admin-dashboard" class="max-w-4xl mx-auto mt-10 p-4 hidden">
        <div class="bg-white p-8 rounded-lg shadow-lg">
            <h2 class="text-2xl font-bold mb-6 shopee-text flex items-center gap-2">
                <span class="bg-orange-100 p-2 rounded-full">🛡️</span> Admin Dashboard
            </h2>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 text-sm">
                            <th class="p-3 border">Username</th>
                            <th class="p-3 border">Phone</th>
                            <th class="p-3 border">Email</th>
                            <th class="p-3 border">Action</th>
                        </tr>
                    </thead>
                    <tbody id="admin-user-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ─── ระบบจัดการข้อมูล (ใช้ LocalStorage เพื่อให้ข้อมูลคงอยู่) ───
        
        // บัญชี Admin ตั้งต้น
        if (!localStorage.getItem('user_admin')) {
            localStorage.setItem('user_admin', JSON.stringify({
                username: 'admin', password: '1234', phone: '000', email: 'admin@shopee.com'
            }));
        }

        function register() {
            const u = document.getElementById('reg-username').value;
            const p = document.getElementById('reg-password').value;
            const cp = document.getElementById('reg-confirm-password').value;
            const ph = document.getElementById('reg-phone').value;
            const em = document.getElementById('reg-email').value;
            const err = document.getElementById('reg-error');

            if (!u || !p || !cp || !ph || !em) { err.innerText = "กรุณากรอกข้อมูลให้ครบ"; return; }
            if (p !== cp) { err.innerText = "รหัสผ่านไม่ตรงกัน"; return; }
            if (localStorage.getItem('user_' + u)) { err.innerText = "ชื่อผู้ใช้นี้มีในระบบแล้ว"; return; }

            const userData = { username: u, password: p, phone: ph, email: em };
            localStorage.setItem('user_' + u, JSON.stringify(userData));
            
            alert("สมัครสมาชิกสำเร็จ!");
            showView('login');
        }

        function login() {
            const u = document.getElementById('login-username').value;
            const p = document.getElementById('login-password').value;
            const err = document.getElementById('login-error');

            const storedData = localStorage.getItem('user_' + u);
            if (storedData) {
                const user = JSON.parse(storedData);
                if (user.password === p) {
                    // Login สำเร็จ
                    localStorage.setItem('session_user', u);
                    initSession(u);
                    return;
                }
            }
            err.innerText = "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง";
        }

        function logout() {
            localStorage.removeItem('session_user');
            location.reload();
        }

        function initSession(username) {
            document.getElementById('nav-user-info').classList.remove('hidden');
            document.getElementById('current-user-display').innerText = username;
            document.getElementById('user-navbar').classList.remove('hidden');

            if (username === 'admin') {
                showView('admin');
                renderAdminTable();
            } else {
                showView('shop');
            }
        }

        function renderAdminTable() {
            const tbody = document.getElementById('admin-user-table-body');
            tbody.innerHTML = '';
            
            // วนลูปหา User ทั้งหมดใน LocalStorage
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('user_')) {
                    const user = JSON.parse(localStorage.getItem(key));
                    if (user.username === 'admin') continue; // ไม่แสดง admin ในตารางลบ

                    const row = `
                        <tr class="text-sm border-b hover:bg-gray-50" id="row-${user.username}">
                            <td class="p-3 border">${user.username}</td>
                            <td class="p-3 border">${user.phone}</td>
                            <td class="p-3 border">${user.email}</td>
                            <td class="p-3 border">
                                <button id="btn-delete-${user.username}" onclick="deleteUser('${user.username}')" class="text-red-500 font-bold hover:underline">ลบออก</button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                }
            }
        }

        function deleteUser(username) {
            if (confirm('ยืนยันที่จะลบผู้ใช้ ' + username + ' ใช่หรือไม่?')) {
                localStorage.removeItem('user_' + username);
                renderAdminTable();
            }
        }

        function showView(view) {
            // ซ่อนทุกหน้า
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-register').classList.add('hidden');
            document.getElementById('view-user-shop').classList.add('hidden');
            document.getElementById('view-admin-dashboard').classList.add('hidden');

            if (view === 'login') document.getElementById('view-login').classList.remove('hidden');
            if (view === 'register') document.getElementById('view-register').classList.remove('hidden');
            if (view === 'shop') document.getElementById('view-user-shop').classList.remove('hidden');
            if (view === 'admin') document.getElementById('view-admin-dashboard').classList.remove('hidden');
        }

        // ตรวจสอบ Session เมื่อเปิดหน้าเว็บ
        window.onload = function() {
            const session = localStorage.getItem('session_user');
            if (session) initSession(session);
        };
    </script>
</body>
</html>
